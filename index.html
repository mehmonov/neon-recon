<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Neon Recon</title>
    <style>
      :root {
        --bg: #05070b;
        --teal: #2be0c6;
        --green: #3ddc97;
        --text: #eaf0f0;
        --muted: #8a95a0;
      }
      * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      html, body { margin: 0; height: 100%; background: var(--bg); overflow: hidden; font-family: system-ui, sans-serif; color: var(--text); user-select: none; }
      #game { display: block; width: 100vw; height: 100vh; touch-action: none; }
      .screen {
        position: absolute; inset: 0; display: none;
        flex-direction: column; align-items: center; justify-content: center; gap: 16px;
        background: rgba(5, 7, 11, 0.82); text-align: center; padding: 24px;
      }
      .screen h1 { margin: 0; font-size: 42px; font-weight: 600; letter-spacing: 2px; }
      .screen .tag { color: var(--muted); margin: 0 0 6px; max-width: 320px; line-height: 1.5; }
      .score { font-size: 20px; color: #ffc24b; margin: 0; }
      .btn {
        font: inherit; font-size: 18px; padding: 12px 36px; border-radius: 12px;
        border: 1.5px solid var(--teal); background: rgba(43, 224, 198, 0.08); color: var(--teal); cursor: pointer;
      }
      .btn:active { transform: scale(0.97); }
      #btn-pause {
        position: absolute; top: 14px; right: 14px; display: none;
        width: 44px; height: 44px; border-radius: 10px; border: 1px solid #2a3340;
        background: rgba(14, 20, 28, 0.7); color: var(--text); font-size: 16px; cursor: pointer;
      }
      .hint { color: var(--muted); font-size: 13px; margin: 4px 0 0; }
      #screen-menu { background-image: linear-gradient(rgba(5, 7, 11, 0.55), rgba(5, 7, 11, 0.84)), url('/assets/menu_bg.jpg'); background-size: cover; background-position: center; }
      #logo { width: min(82%, 420px); height: auto; margin-bottom: 4px; }
    </style>
  </head>
  <body>
    <canvas id="game"></canvas>
    <button id="btn-pause" aria-label="Pauza">II</button>

    <div id="screen-menu" class="screen">
      <img id="logo" src="/assets/logo.png" alt="NEON RECON" />
      <p class="tag">Konusingizga tushgan dushmanlarni toping va yo'q qiling. Hammasini tugatsangiz — g'alaba.</p>
      <button id="btn-play" class="btn">O'ynash</button>
      <p class="hint">PC: WASD + sichqoncha &nbsp;·&nbsp; Telefon: ikki joystick</p>
    </div>

    <div id="screen-pause" class="screen">
      <h1>Pauza</h1>
      <button id="btn-resume" class="btn">Davom etish</button>
      <button id="btn-restart" class="btn">Qayta boshlash</button>
    </div>

    <div id="screen-over" class="screen">
      <h1 style="color: #ff6b78">Mag'lubiyat</h1>
      <p id="over-score" class="score">Ball: 0</p>
      <button id="btn-retry" class="btn">Qayta o'ynash</button>
    </div>

    <div id="screen-win" class="screen">
      <h1 style="color: var(--green)">G'alaba!</h1>
      <p id="win-score" class="score">Ball: 0</p>
      <button id="btn-again" class="btn">Yana o'ynash</button>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
